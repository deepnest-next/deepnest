---
    name: Application Build

    on:
      push:
        exclude:
        - tags
        - branches: [ 'release/*' ]
      pull_request:
      

    jobs:
      build:
        strategy:
          matrix:
            os: [
                { name: 'linux',   image: 'ubuntu-24.04' },
                { name: 'linux_arm64',   image: 'ubuntu-24.04-arm' },
                { name: 'windows', image: 'windows-latest' },
                { name: 'macos',   image: 'macos-latest' },
                { name: 'macos_x86',   image: 'macos-13' }
              ]
            arch: [ 'x64', 'arm64' ]
          fail-fast: false


        runs-on: ${{ matrix.os.image }}

        steps:
          - name: Github checkout
            uses: actions/checkout@v4

          - name: Corepack Enable Yarn
            run: corepack enable yarn

          - name: Setup Node (v20)
            uses: actions/setup-node@v4
            with:
              # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
              cache: 'yarn'
              node-version: "20"

          - name: Install dependencies
            run: yarn --immutable

          - name: Install distribution dependencies
            shell: bash
            run: |
              if [[ ("${{ matrix.os.name }}" == "linux" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os.name }}" == "linux_arm64" && "${{ matrix.arch }}" == "arm64") ]]; then
                sudo apt-get update && sudo apt-get upgrade && sudo apt-get install -y flatpak flatpak-builder elfutils snapd libgl1 libglx-mesa0;
                flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo ;
                flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo ;
                flatpak update --appstream -y;
                flatpak install -y --user flathub org.freedesktop.Sdk//24.08;
                flatpak install -y --user flathub org.freedesktop.Platform//24.08;
                sudo apt-get install -y flatpak flatpak-builder elfutils ;
                git config --global --add protocol.file.allow always
                #sudo snap install snapcraft --classic;
                #sudo snap install core22 --classic;
              fi
              # if [ "${{ matrix.os.name }}" == "windows" ]; then
              #   choco install -y nsis;
              #   choco install wixtoolset  --version=3.14.0;
              # fi

          - name: Build (${{ matrix.arch }})
            # if: matrix.os.image == 'macos-latest'
            shell: bash
            env:
              UPDATE_FEED_OWNER: ${{ vars.DN_UPDATE_FEED_OWNER }}
              UPDATE_FEED_REPOSITORY: ${{ vars.DN_UPDATE_FEED_REPOSITORY }}
            run: |
              mkdir -p out/make/;
              if [[ ("${{ matrix.os.name }}" == "linux" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os.name }}" == "linux_arm64" && "${{ matrix.arch }}" == "arm64") ]]; then
                yarn make --arch ${{ matrix.arch }};
              fi
              if [ "${{ matrix.os.name }}" == "windows" ]; then
                yarn make --arch ${{ matrix.arch }};
              fi
              if [[ "${{ matrix.os.name }}" == *"macos"* ]]; then
                yarn make --arch ${{ matrix.arch }};
              fi
              find ./out/make -type f

          - name: Upload artifacts (${{ matrix.arch }})
            uses: actions/upload-artifact@v4
            with:
              name: dist-${{ matrix.os.name }}-${{ matrix.arch }}
              path: |
                out/make/
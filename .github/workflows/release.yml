---
name: Application Publish

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: ['ubuntu-24.04','ubuntu-24.04-arm', 'windows-latest', 'macos-latest', 'macos-13']
        arch: [ 'x64', 'arm64' ]
        # exclude:
        #   # Mitigation for Electron Forge naming conflict. See #1183.
        #   - os: 'windows-latest'
        #     arch: 'arm64'
        
      fail-fast: true # Explicitly failing fast because this is a publish. We want to bail the entire release if something went wrong with another build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Github checkout
        uses: actions/checkout@v4

      - name: Corepack Enable Yarn
        run: corepack enable yarn

      - name: Setup Node (v20)
        uses: actions/setup-node@v4
        with:
          # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
          cache: 'yarn'
          node-version: "20"

      - name: Install dependencies
        run: yarn --immutable

      - name: Install distribution dependencies
        shell: bash
        run: |
          if [[ ("${{ matrix.os }}" == "ubuntu-24.04" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os }}" == "ubuntu-24.04-arm" && "${{ matrix.arch }}" == "arm64") ]]; then
            sudo apt-get update && sudo apt-get upgrade && sudo apt-get install -y flatpak flatpak-builder elfutils snapd libgl1 libglx-mesa0;
            flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo ;
            flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo ;
            flatpak update --appstream -y;
            flatpak install -y --user flathub org.freedesktop.Sdk//24.08;
            flatpak install -y --user flathub org.freedesktop.Platform//24.08;
            sudo apt-get install -y flatpak flatpak-builder elfutils ;
            git config --global --add protocol.file.allow always
            #sudo snap install snapcraft --classic;
            #sudo snap install core22 --classic;
          fi
          # if [ "${{ matrix.os.name }}" == "windows" ]; then
          #   choco install -y nsis;
          #   choco install wixtoolset  --version=3.14.0;
          # fi

      - name: Publish Dry (${{ matrix.arch }})
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_FEED_OWNER: ${{ vars.DN_UPDATE_FEED_OWNER }}
          UPDATE_FEED_REPOSITORY: ${{ vars.DN_UPDATE_FEED_REPOSITORY }}
        run: |
          if [[ ("${{ matrix.os }}" == "ubuntu-24.04" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os }}" == "ubuntu-24.04-arm" && "${{ matrix.arch }}" == "arm64") ]]; then
            yarn publish:dry --arch ${{ matrix.arch }}
          fi
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            yarn publish:dry --arch ${{ matrix.arch }}
          fi
          if [[ ("${{ matrix.os }}" == "macos-13" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os }}" == "macos-latest" && "${{ matrix.arch }}" == "arm64") ]]; then
            yarn publish:dry --arch ${{ matrix.arch }}
          fi

      - name: Publish From Dry (${{ matrix.arch }})
        shell: bash
        run: |
          if [[ ("${{ matrix.os }}" == "ubuntu-24.04" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os }}" == "ubuntu-24.04-arm" && "${{ matrix.arch }}" == "arm64") ]]; then
            yarn publish:fromdry --arch ${{ matrix.arch }}
          fi
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            yarn publish:fromdry --arch ${{ matrix.arch }}
          fi
          if [[ ("${{ matrix.os }}" == "macos-13" && "${{ matrix.arch }}" == "x64") || ("${{ matrix.os }}" == "macos-latest" && "${{ matrix.arch }}" == "arm64") ]]; then
            yarn publish:fromdry --arch ${{ matrix.arch }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_FEED_OWNER: ${{ vars.DN_UPDATE_FEED_OWNER }}
          UPDATE_FEED_REPOSITORY: ${{ vars.DN_UPDATE_FEED_REPOSITORY }}